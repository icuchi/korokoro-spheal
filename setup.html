<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>タマザラシ セットアップ</title>
  <style>
    body { font-family: sans-serif; padding: 32px; max-width: 600px; }
    h1 { font-size: 18px; }
    .step { margin: 20px 0; padding: 16px; background: #f5f5f5; border-radius: 8px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    button { padding: 10px 24px; background: #4a9ede; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:disabled { background: #ccc; }
    #status { margin-top: 12px; color: green; font-weight: bold; }
    #error { margin-top: 12px; color: red; }
  </style>
</head>
<body>
  <h1>タマザラシの雨 — 画像セットアップ</h1>

  <div class="step">
    <label>① spheal.png を選択してください</label>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

  <div class="step">
    <label>② ボタンを押すと content.js が自動生成されます</label>
    <button id="btn" onclick="generate()" disabled>content.js を生成してダウンロード</button>
    <div id="status"></div>
    <div id="error"></div>
  </div>

  <div class="step">
    <label>③ ダウンロードされた spheal-main.js を spheal-extension フォルダに入れて、Chromeで拡張を再読み込みしてください</label>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const btn = document.getElementById('btn');

    fileInput.addEventListener('change', () => {
      btn.disabled = !fileInput.files.length;
    });

    function generate() {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;

        const js = `(() => {
  const SPHEAL_URL = '${dataUrl}';
  const SPAWN_INTERVAL_MS = 900;
  const SIZE = 64;

  let intervalId = null;
  let enabled = true;

  function spawnSpheal() {
    const el = document.createElement('img');
    el.src = SPHEAL_URL;
    el.setAttribute('aria-hidden', 'true');

    const maxX = Math.max(window.innerWidth - SIZE, 0);
    const startX = Math.floor(Math.random() * maxX);
    const speed = 2.5 + Math.random() * 3;
    const spin = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 6);

    Object.assign(el.style, {
      position: 'fixed',
      left: startX + 'px',
      top: -SIZE + 'px',
      width: SIZE + 'px',
      height: SIZE + 'px',
      zIndex: '2147483647',
      pointerEvents: 'none',
      imageRendering: 'pixelated',
      userSelect: 'none',
      margin: '0',
      padding: '0',
      border: 'none',
      maxWidth: 'none',
    });

    document.documentElement.appendChild(el);

    let y = -SIZE;
    let angle = 0;

    function tick() {
      y += speed;
      angle += spin;
      el.style.top = y + 'px';
      el.style.transform = \`rotate(\${angle}deg)\`;

      if (y > window.innerHeight) {
        el.remove();
      } else {
        requestAnimationFrame(tick);
      }
    }

    requestAnimationFrame(tick);
  }

  function start() {
    if (intervalId !== null) return;
    intervalId = setInterval(spawnSpheal, SPAWN_INTERVAL_MS);
  }

  function stop() {
    if (intervalId === null) return;
    clearInterval(intervalId);
    intervalId = null;
  }

  function applyState(isEnabled) {
    enabled = isEnabled;
    isEnabled ? start() : stop();
  }

  chrome.storage.local.get({ sphealEnabled: true }, ({ sphealEnabled }) => {
    applyState(sphealEnabled);
  });

  chrome.storage.onChanged.addListener((changes) => {
    if (changes.sphealEnabled) {
      applyState(changes.sphealEnabled.newValue);
    }
  });
})();
`;

        const blob = new Blob([js], { type: 'text/javascript' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'spheal-main.js';
        a.click();

        document.getElementById('status').textContent = '✅ content.js をダウンロードしました！';
      };
      reader.onerror = () => {
        document.getElementById('error').textContent = '❌ ファイルの読み込みに失敗しました。';
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
