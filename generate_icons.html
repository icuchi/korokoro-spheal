<!DOCTYPE html>
<html>
<!--
  このファイルをブラウザで開いてボタンを押すと、
  icon16.png / icon48.png / icon128.png がダウンロードされます。
  ダウンロードしたファイルをこのフォルダに置いてください。
-->
<body>
<button onclick="generate()">アイコンを生成してダウンロード</button>
<script>
function drawSpheal(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2, r = size * 0.44;

  // body
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#5aace0';
  ctx.fill();
  ctx.strokeStyle = '#2070b0';
  ctx.lineWidth = size * 0.04;
  ctx.stroke();

  // belly patch
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.15, r * 0.55, r * 0.4, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#c8eaff';
  ctx.fill();

  // left eye
  const eyeR = r * 0.13;
  ctx.beginPath();
  ctx.arc(cx - r * 0.3, cy - r * 0.2, eyeR, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();

  // right eye
  ctx.beginPath();
  ctx.arc(cx + r * 0.3, cy - r * 0.2, eyeR, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();

  // nose
  ctx.beginPath();
  ctx.arc(cx, cy + r * 0.05, r * 0.07, 0, Math.PI * 2);
  ctx.fillStyle = '#e07050';
  ctx.fill();

  return canvas;
}

function generate() {
  [16, 48, 128].forEach(size => {
    const canvas = drawSpheal(size);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `icon${size}.png`;
    a.click();
  });
}
</script>
</body>
</html>
